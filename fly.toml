# fly.toml app configuration file generated for app-dry-frost-4912 on 2026-02-16T22:14:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "telecalbot"
primary_region = 'fra'

[env]
DATABASE_PATH = "/data/telecalbot.db"
TELEGRAM_DELIVERY_MODE = "webhook"
TELEGRAM_WEBHOOK_URL = "https://telecalbot.fly.dev/telegram/webhook"
TELEGRAM_WEBHOOK_PATH = "/telegram/webhook"
TELEGRAM_WEBHOOK_LISTEN = "0.0.0.0"
TELEGRAM_WEBHOOK_PORT = "8080"
HEALTH_CHECK_PATH = "/healthz"
READINESS_CHECK_PATH = "/readyz"

[processes]
app = "/app/.venv/bin/python -m app.main"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[mounts]]
  source = "telecalbot_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
